<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vidcast playback</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #msg {
      color: #ccc;
      font-family: system-ui, sans-serif;
      padding: 1rem;
      max-width: 40rem;
    }
    /* Room display: finger-sized tap target above the video plane */
    #close-experiment {
      position: fixed;
      top: max(16px, env(safe-area-inset-top, 0px));
      right: max(16px, env(safe-area-inset-right, 0px));
      z-index: 9999;
      box-sizing: border-box;
      width: clamp(56px, 12vmin, 96px);
      height: clamp(56px, 12vmin, 96px);
      border-radius: 50%;
      border: 3px solid #fff;
      background: #c62828;
      color: #fff;
      font-size: clamp(28px, 7vmin, 44px);
      font-weight: 700;
      line-height: 1;
      padding: 0;
      margin: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      touch-action: manipulation;
    }
    #close-experiment:active {
      filter: brightness(0.92);
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <video id="v" controls playsinline autoplay></video>
  <button type="button" id="close-experiment" aria-label="Close">×</button>
  <p id="msg" hidden></p>
  <script>
(function () {
  function showError(text) {
    var v = document.getElementById("v");
    if (v) v.removeAttribute("src");
    var m = document.getElementById("msg");
    if (m) {
      m.textContent = text;
      m.hidden = false;
    }
  }

  /**
   * Restrict which hosts may be loaded as &src= (defense-in-depth).
   * Extend this list if Vidcast changes CDN hostnames.
   */
  function isAllowedVideoUrl(u) {
    try {
      var parsed = new URL(u);
      if (parsed.protocol !== "https:") return false;
      var h = parsed.hostname.toLowerCase();
      if (h === "app.vidcast.io" || h.endsWith(".vidcast.io")) return true;
      if (h.endsWith(".cloudfront.net")) return true;
      if (h.endsWith(".amazonaws.com")) return true;
      if (h.endsWith(".blob.core.windows.net")) return true;
      return false;
    } catch (e) {
      return false;
    }
  }

  var params = new URLSearchParams(window.location.search);
  var raw = params.get("src");
  if (!raw) {
    showError("Missing src query parameter.");
    return;
  }
  var src;
  try {
    src = decodeURIComponent(raw);
  } catch (e) {
    showError("Invalid src encoding.");
    return;
  }
  if (!isAllowedVideoUrl(src)) {
    showError("Video URL host is not allow-listed for this player page.");
    return;
  }
  var el = document.getElementById("v");
  if (!el) return;
  el.src = src;
})();

  var closeBtn = document.getElementById("close-experiment");
  if (closeBtn) {
    closeBtn.addEventListener("click", function () {
      window.close();
    });
  }
  </script>
</body>
</html>
