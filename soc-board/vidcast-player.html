<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vidcast playback</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #msg {
      color: #ccc;
      font-family: system-ui, sans-serif;
      padding: 1rem;
      max-width: 40rem;
    }
    .settings-anchor {
      position: fixed;
      top: max(16px, env(safe-area-inset-top, 0px));
      right: max(16px, env(safe-area-inset-right, 0px));
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }
    .top-buttons {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: clamp(10px, 2vmin, 16px);
    }
    .orb-btn {
      box-sizing: border-box;
      width: clamp(45px, 9.6vmin, 77px);
      height: clamp(45px, 9.6vmin, 77px);
      border-radius: 50%;
      border: 2px solid #fff;
      padding: 0;
      margin: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .orb-btn:active {
      filter: brightness(0.92);
      transform: scale(0.96);
    }
    #settings-toggle {
      background: #616161;
      color: #fff;
    }
    #settings-toggle svg {
      width: 52%;
      height: 52%;
      display: block;
    }
    #close-experiment {
      background: #c62828;
      color: #fff;
      font-size: clamp(22px, 5.6vmin, 35px);
      font-weight: 700;
      line-height: 1;
    }
    .settings-popover {
      min-width: min(280px, 85vw);
      max-width: 90vw;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(28, 28, 28, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .settings-popover[hidden] {
      display: none !important;
    }
    .vol-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
    }
    #video-mute-toggle {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      min-width: 48px;
      min-height: 48px;
      padding: 0;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: #4a4a4a;
      color: #e8e8e8;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #video-mute-toggle:active {
      background: #3d3d3d;
    }
    #video-mute-toggle svg {
      width: 26px;
      height: 26px;
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #video-mute-toggle .icon-speaker-muted {
      color: #bdbdbd;
    }
    #video-volume {
      flex: 1;
      min-width: 0;
      height: 40px;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }
    #video-volume:focus {
      outline: none;
    }
    #video-volume::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 4px;
      background: #5c5c5c;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    #video-volume::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      margin-top: -7px;
      border-radius: 50%;
      background: #f0f0f0;
      border: 2px solid #8a8a8a;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    }
    #video-volume::-moz-range-track {
      height: 8px;
      border-radius: 4px;
      background: #5c5c5c;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    #video-volume::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f0f0f0;
      border: 2px solid #8a8a8a;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body>
  <video id="v" controls playsinline autoplay></video>
  <div id="settings-anchor" class="settings-anchor">
    <div class="top-buttons">
      <button type="button" class="orb-btn" id="settings-toggle" aria-label="Playback settings" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
          <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.31-.09.63-.09.94s.02.63.06.93l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
      <button type="button" class="orb-btn" id="close-experiment" aria-label="Close">×</button>
    </div>
    <div id="settings-popover" class="settings-popover" hidden role="dialog" aria-label="Video audio">
      <div class="vol-row">
        <button type="button" id="video-mute-toggle" aria-label="Mute">
          <svg class="icon-speaker-on" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <svg class="icon-speaker-muted" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor" hidden>
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
          </svg>
        </button>
        <input type="range" id="video-volume" min="0" max="1" step="0.01" value="1" aria-valuemin="0" aria-valuemax="1" />
      </div>
    </div>
  </div>
  <p id="msg" hidden></p>
  <script>
(function () {
  function showError(text) {
    var v = document.getElementById("v");
    if (v) v.removeAttribute("src");
    var m = document.getElementById("msg");
    if (m) {
      m.textContent = text;
      m.hidden = false;
    }
  }

  function isAllowedVideoUrl(u) {
    try {
      var parsed = new URL(u);
      if (parsed.protocol !== "https:") return false;
      var h = parsed.hostname.toLowerCase();
      if (h === "app.vidcast.io" || h.endsWith(".vidcast.io")) return true;
      if (h.endsWith(".cloudfront.net")) return true;
      if (h.endsWith(".amazonaws.com")) return true;
      if (h.endsWith(".blob.core.windows.net")) return true;
      return false;
    } catch (e) {
      return false;
    }
  }

  var params = new URLSearchParams(window.location.search);
  var raw = params.get("src");
  if (!raw) {
    showError("Missing src query parameter.");
    return;
  }
  var src;
  try {
    src = decodeURIComponent(raw);
  } catch (e) {
    showError("Invalid src encoding.");
    return;
  }
  if (!isAllowedVideoUrl(src)) {
    showError("Video URL host is not allow-listed for this player page.");
    return;
  }
  var el = document.getElementById("v");
  if (!el) return;
  el.src = src;
})();

(function () {
  var video = document.getElementById("v");
  var settingsToggle = document.getElementById("settings-toggle");
  var popover = document.getElementById("settings-popover");
  var muteBtn = document.getElementById("video-mute-toggle");
  var volSlider = document.getElementById("video-volume");
  var anchor = document.getElementById("settings-anchor");
  var closeBtn = document.getElementById("close-experiment");

  function isPopoverOpen() {
    return popover && !popover.hidden;
  }

  function setPopoverOpen(open) {
    if (!popover || !settingsToggle) return;
    popover.hidden = !open;
    settingsToggle.setAttribute("aria-expanded", open ? "true" : "false");
    if (open) syncPopoverFromVideo();
  }

  function syncMuteIcons() {
    if (!muteBtn || !video) return;
    var on = muteBtn.querySelector(".icon-speaker-on");
    var off = muteBtn.querySelector(".icon-speaker-muted");
    if (on) on.hidden = video.muted;
    if (off) off.hidden = !video.muted;
    muteBtn.setAttribute("aria-label", video.muted ? "Unmute" : "Mute");
  }

  function syncPopoverFromVideo() {
    if (!video || !muteBtn || !volSlider) return;
    volSlider.value = String(video.volume);
    syncMuteIcons();
  }

  if (video) {
    video.addEventListener("volumechange", function () {
      if (popover && !popover.hidden) syncPopoverFromVideo();
    });
  }

  if (video && volSlider) {
    volSlider.addEventListener("input", function () {
      var x = parseFloat(volSlider.value);
      if (!isNaN(x)) {
        video.volume = x;
        if (x > 0) video.muted = false;
      }
      syncMuteIcons();
    });
  }

  if (video && muteBtn) {
    muteBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      video.muted = !video.muted;
      syncMuteIcons();
    });
  }

  if (settingsToggle && popover) {
    settingsToggle.addEventListener("click", function (e) {
      e.stopPropagation();
      setPopoverOpen(!isPopoverOpen());
    });
  }

  document.addEventListener(
    "click",
    function (ev) {
      if (!popover || popover.hidden) return;
      if (anchor && anchor.contains(ev.target)) return;
      setPopoverOpen(false);
    },
    false
  );

  if (closeBtn) {
    closeBtn.addEventListener("click", function () {
      window.close();
    });
  }
})();
  </script>
</body>
</html>
