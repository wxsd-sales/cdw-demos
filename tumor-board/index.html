<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tumor board</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #v-screen {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
      background: #000;
    }
    /* Second clip: must be playing for captureStream; keep off-screen (not display:none). */
    #v-publish-wrap {
      position: fixed;
      width: 160px;
      height: 90px;
      left: -9999px;
      top: 0;
      opacity: 0.01;
      pointer-events: none;
      z-index: 0;
    }
    #v-publish {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .banner {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      z-index: 10;
      padding: 8px 12px;
      font: 14px/1.4 system-ui, sans-serif;
      color: #eee;
      background: rgba(30, 40, 55, 0.92);
      border-bottom: 1px solid #444;
    }
    .banner-err { background: rgba(80, 30, 30, 0.95); color: #fff; }
    .banner-ok { background: rgba(25, 60, 40, 0.95); color: #fff; }
  </style>
</head>
<body>
  <div id="banner" class="banner"></div>
  <video id="v-screen" playsinline autoplay muted></video>
  <div id="v-publish-wrap" aria-hidden="true">
    <video id="v-publish" playsinline autoplay muted></video>
  </div>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/webex@3.7.0/umd/webex.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
